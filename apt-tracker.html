<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏢 실거래가 모니터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b14; --card: #0e1320; --card2: #0b0f1c;
    --border: #1a2235; --border2: #2a3550;
    --accent: #e8b84b; --accent-dim: rgba(232,184,75,0.15);
    --text: #e2e8f0; --muted: #4a5568; --muted2: #718096;
    --up: #34d399; --down: #f87171; --blue: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh; overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── LAYOUT ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── SETUP ── */
  #setup-screen {
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 24px;
  }
  .setup-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 44px 40px; max-width: 500px; width: 100%;
    animation: fadeUp 0.4s ease;
  }
  .setup-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
  .setup-title {
    text-align: center; font-size: 26px; font-weight: 900; margin-bottom: 8px;
  }
  .setup-title span { color: var(--accent); }
  .setup-sub { text-align: center; color: var(--muted2); font-size: 14px; line-height: 1.7; margin-bottom: 28px; }
  .how-to {
    background: #080c18; border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 24px;
  }
  .how-to-title { color: var(--accent); font-size: 12px; font-weight: 700; margin-bottom: 12px; }
  .how-to-step { display: flex; gap: 10px; margin-bottom: 7px; font-size: 13px; }
  .how-to-num { color: var(--accent); font-weight: 700; min-width: 18px; }
  .how-to-text { color: #94a3b8; }
  .how-to-step:last-child { margin-bottom: 0; }

  /* ── DASHBOARD ── */
  #dashboard-screen { padding: 24px 20px 80px; max-width: 960px; margin: 0 auto; }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; padding-top: 4px;
  }
  .header-title { font-size: 20px; font-weight: 900; }
  .header-title span { color: var(--accent); }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

  /* ── CARD ── */
  .apt-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    animation: fadeUp 0.35s ease both;
  }
  .apt-card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .card-head {
    padding: 16px 16px 12px; border-bottom: 1px solid var(--border);
    background: #09111e;
  }
  .card-head-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .card-apt-name {
    font-size: 15px; font-weight: 700; margin-top: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 200px;
  }
  .card-region { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card-body { padding: 16px; }
  .card-remove {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 18px; line-height: 1; padding: 2px 4px; border-radius: 4px;
    transition: color 0.15s;
  }
  .card-remove:hover { color: var(--down); }

  /* badge */
  .badge-new {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 99px;
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid rgba(232,184,75,0.4);
    animation: pulse 2s infinite;
  }
  .tag {
    display: inline-block; background: #131a28; color: var(--muted2);
    font-size: 11px; padding: 2px 9px; border-radius: 99px; margin-top: 6px;
  }

  /* latest price */
  .latest-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .latest-row { display: flex; justify-content: space-between; align-items: baseline; }
  .latest-price {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px; font-weight: 600;
  }
  .latest-date { font-size: 11px; color: var(--muted); }
  .latest-detail { font-size: 12px; color: var(--muted); margin-top: 3px; }

  /* trend box */
  .trend-box {
    background: var(--card2); border-radius: 9px;
    padding: 10px 13px; margin-top: 13px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .trend-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .trend-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px; font-weight: 600;
  }
  .up-color { color: var(--up); }
  .down-color { color: var(--down); }
  .neu-color { color: var(--muted2); }
  .blue-color { color: var(--blue); }

  /* empty/loading states */
  .state-empty {
    text-align: center; padding: 80px 20px; color: var(--muted);
    grid-column: 1 / -1;
  }
  .state-empty-icon { font-size: 48px; margin-bottom: 16px; }
  .state-empty-title { font-size: 16px; margin-bottom: 6px; }
  .state-empty-sub { font-size: 13px; }
  .card-loading { text-align: center; padding: 28px 0; color: var(--muted); font-size: 13px; }
  .card-error { color: var(--down); font-size: 12px; text-align: center; padding: 20px 0; }

  /* ── BUTTONS ── */
  .btn-primary {
    background: var(--accent); color: #0a0a0a; border: none;
    padding: 11px 22px; border-radius: 9px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: opacity 0.15s, transform 0.1s;
    width: 100%;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-ghost {
    background: transparent; color: var(--muted2);
    border: 1px solid var(--border); padding: 9px 16px;
    border-radius: 8px; font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-icon {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); padding: 9px 12px;
    border-radius: 8px; font-size: 15px; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-icon:hover { border-color: var(--border2); color: var(--text); }

  /* ── FAB ── */
  #fab {
    position: fixed; bottom: 28px; right: 24px;
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--accent); border: none; font-size: 26px;
    cursor: pointer; color: #000; display: flex;
    align-items: center; justify-content: center;
    box-shadow: 0 4px 24px rgba(232,184,75,0.45);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 10;
  }
  #fab:hover { transform: scale(1.1); box-shadow: 0 6px 28px rgba(232,184,75,0.6); }

  /* ── INPUTS ── */
  .form-label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
  .form-label .req { color: var(--down); }
  .form-group { margin-bottom: 16px; }
  input[type=text], input[type=password], select {
    background: #07090f; border: 1px solid var(--border);
    color: var(--text); padding: 11px 14px; border-radius: 9px;
    font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    outline: none; transition: border-color 0.15s; width: 100%;
  }
  input[type=text]:focus, input[type=password]:focus, select:focus {
    border-color: var(--accent);
  }
  input::placeholder { color: var(--muted); }
  .input-row { display: flex; gap: 8px; align-items: center; }
  .input-row input { flex: 1; }
  .input-sep { color: var(--muted); font-size: 14px; flex-shrink: 0; }
  .form-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 16px; opacity: 0;
    transition: opacity 0.2s;
  }
  .modal-backdrop.show { opacity: 1; }
  .modal-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; width: 100%; max-width: 460px;
    padding: 28px; animation: fadeUp 0.25s ease;
  }
  .modal-head {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 24px;
  }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 22px; line-height: 1;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }

  /* ── DETAIL SHEET ── */
  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 200; opacity: 0; transition: opacity 0.2s;
  }
  .sheet-backdrop.show { opacity: 1; }
  .sheet-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px 18px 0 0; border-bottom: none;
    width: 100%; max-width: 640px;
    max-height: 85vh; display: flex; flex-direction: column;
    transform: translateY(30px); transition: transform 0.25s ease;
  }
  .sheet-backdrop.show .sheet-box { transform: translateY(0); }
  .sheet-head {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sheet-head-top { display: flex; justify-content: space-between; align-items: center; }
  .sheet-title { font-size: 17px; font-weight: 700; }
  .sheet-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .sheet-body { overflow-y: auto; flex: 1; padding: 8px 24px 32px; }

  /* tx rows */
  .tx-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 0; border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .tx-row:last-child { border-bottom: none; }
  .tx-date { font-size: 13px; color: var(--muted2); }
  .tx-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .tx-price {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px; font-weight: 600; text-align: right;
  }
  .tx-diff {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; margin-top: 2px; text-align: right;
  }
  .tx-no { color: var(--muted); text-align: center; padding: 40px 0; }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--border2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }
  .spinner-sm { width: 12px; height: 12px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #1a2235; border: 1px solid var(--border2);
    color: var(--text); padding: 10px 20px; border-radius: 99px;
    font-size: 13px; z-index: 999; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── REGION SEARCH ── */
  .region-search { margin-bottom: 6px; }
  select option { background: #0e1320; }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .setup-card { padding: 32px 24px; }
    #dashboard-screen { padding: 16px 12px 80px; }
    .header-title { font-size: 17px; }
  }
</style>
</head>
<body>

<!-- ─── DASHBOARD SCREEN ──────────────────────────────────────── -->
<div id="dashboard-screen" class="screen active">
  <div class="header">
    <div>
      <div class="header-title"><span>실거래가</span> 모니터</div>
      <div class="header-sub" id="last-updated-label">아파트를 추가해서 추적을 시작하세요</div>
    </div>
    <div class="header-actions">
      <button class="btn-ghost" id="refresh-btn" onclick="refreshAll()">🔄 새로고침</button>

    </div>
  </div>

  <div class="grid" id="apt-grid">
    <div class="state-empty">
      <div class="state-empty-icon">🏠</div>
      <p class="state-empty-title">추적 중인 아파트가 없어요</p>
      <p class="state-empty-sub">아래 + 버튼으로 관심 아파트를 추가하세요</p>
    </div>
  </div>
</div>

<!-- ─── FAB ──────────────────────────────────────────────────── -->
<button id="fab" onclick="openAddModal()" style="display:none">+</button>

<!-- ─── ADD MODAL ─────────────────────────────────────────────── -->
<div class="modal-backdrop" id="add-modal" onclick="backdropClose(event,'add-modal')">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title">아파트 추가</span>
      <button class="modal-close" onclick="closeModal('add-modal')">×</button>
    </div>

    <div class="form-group">
      <label class="form-label">지역 검색</label>
      <input type="text" id="region-search" class="region-search" placeholder="예: 강남, 분당, 해운대"
        oninput="filterRegions()">
    </div>
    <div class="form-group">
      <label class="form-label">시군구 선택 <span class="req">*</span></label>
      <select id="region-select" style="height:44px"></select>
    </div>
    <div class="form-group">
      <label class="form-label">아파트 이름 <span class="req">*</span></label>
      <input type="text" id="apt-name-input" placeholder="예: 래미안대치팰리스, 헬리오시티"
        onkeydown="if(event.key==='Enter') addApartment()">
      <p class="form-hint">정확한 이름 일부만 입력해도 검색됩니다</p>
    </div>
    <div class="form-group">
      <label class="form-label">전용면적 필터 ㎡ (선택)</label>
      <div class="input-row">
        <input type="text" id="min-area" placeholder="최소 (예: 59)">
        <span class="input-sep">~</span>
        <input type="text" id="max-area" placeholder="최대 (예: 85)">
      </div>
      <p class="form-hint">비워두면 전체 면적 조회</p>
    </div>

    <button class="btn-primary" onclick="addApartment()">추가하기</button>
  </div>
</div>

<!-- ─── DETAIL SHEET ───────────────────────────────────────────── -->
<div class="sheet-backdrop" id="detail-sheet" onclick="backdropClose(event,'detail-sheet')">
  <div class="sheet-box">
    <div class="sheet-head">
      <div class="sheet-head-top">
        <div>
          <div class="sheet-title" id="sheet-title">-</div>
          <div class="sheet-sub" id="sheet-sub">-</div>
        </div>
        <button class="modal-close" onclick="closeModal('detail-sheet')">×</button>
      </div>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>
</div>

<!-- ─── TOAST ─────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════

const REGIONS = [

// ═══════════════════════════════════════════════════════════════
//  상태
// ═══════════════════════════════════════════════════════════════
let apiKey = '';
let apartments = [];   // [{id, lawdCd, regionName, aptName, minArea, maxArea}]
let transactions = {}; // aptId → [{...tx}]
let newCounts = {};    // aptId → number
let lastSeen = {};     // aptId → Set of tx ids
let isRefreshing = false;

// ═══════════════════════════════════════════════════════════════
//  로컬스토리지
// ═══════════════════════════════════════════════════════════════
function load() {
  apiKey = localStorage.getItem('apt_apikey') || '';
  apartments = JSON.parse(localStorage.getItem('apt_list') || '[]');
  const seenRaw = JSON.parse(localStorage.getItem('apt_lastseen') || '{}');
  lastSeen = {};
  for (const k in seenRaw) lastSeen[k] = new Set(seenRaw[k]);
}
function saveApts() {
  localStorage.setItem('apt_list', JSON.stringify(apartments));
}
function saveSeen() {
  const raw = {};
  for (const k in lastSeen) raw[k] = [...lastSeen[k]];
  localStorage.setItem('apt_lastseen', JSON.stringify(raw));
}

// ═══════════════════════════════════════════════════════════════
//  유틸
// ═══════════════════════════════════════════════════════════════
function getLastNMonths(n) {
  const result = [];
  const now = new Date();
  for (let i = 0; i < n; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    result.push(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  return result;
}

function formatPrice(manwon) {
  if (!manwon) return '-';
  const eok = Math.floor(manwon / 10000);
  const man = manwon % 10000;
  if (eok > 0 && man > 0) return `${eok}억 ${man.toLocaleString()}만`;
  if (eok > 0) return `${eok}억`;
  return `${manwon.toLocaleString()}만`;
}

function formatArea(m2) {
  return `${parseFloat(m2).toFixed(0)}㎡ (${(m2/3.3058).toFixed(0)}평)`;
}

function toast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ═══════════════════════════════════════════════════════════════
//  API 호출
// ═══════════════════════════════════════════════════════════════
async function fetchMonthData(lawdCd, dealYmd) {
  // 로컬 서버(server.py)를 통해 API 호출 - CORS 문제 없음
  const url = `/proxy?LAWD_CD=${lawdCd}&DEAL_YMD=${dealYmd}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`서버 오류 ${res.status}`);
  const xml = await res.text();
  return parseXML(xml);
}

function parseXML(xmlStr) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'text/xml');

  // API 오류 체크 (returnReasonCode가 00이 아닐 때만 에러)
  const returnCode = doc.querySelector('returnReasonCode');
  if (returnCode) {
    const code = returnCode.textContent.trim();
    if (code && code !== '00') {
      const errMsg = doc.querySelector('errMsg')?.textContent?.trim() || '알 수 없는 오류';
      throw new Error(`API 오류 (${code}): ${errMsg}`);
    }
  }

  const items = doc.querySelectorAll('item');
  if (!items.length) return [];
  return Array.from(items).map(item => {
    const get = tag => item.getElementsByTagName(tag)[0]?.textContent?.trim() || '';
    const priceRaw = get('거래금액').replace(/,/g,'').replace(/\s/g,'');
    const price = parseInt(priceRaw) || 0;
    const yr = get('년'), mo = get('월').padStart(2,'0'), dy = get('일').padStart(2,'0');
    return {
      aptName: get('아파트'), area: parseFloat(get('전용면적')) || 0,
      floor: get('층'), price, year: yr, month: mo, day: dy,
      buildYear: get('건축년도'), dong: get('법정동'),
      cancelled: get('해제여부'),
      id: `${get('아파트')}_${yr}${mo}${dy}_F${get('층')}_${get('전용면적')}`,
    };
  }).filter(t => t.cancelled !== 'O' && t.price > 0 && t.aptName);
}

async function fetchApt(apt) {
  const months = getLastNMonths(3);
  const all = [];
  for (const ym of months) {
    const txs = await fetchMonthData(apt.lawdCd, ym);
    all.push(...txs);
  }
  return all
    .filter(tx =>
      tx.aptName.includes(apt.aptName) &&
      (!apt.minArea || tx.area >= apt.minArea) &&
      (!apt.maxArea || tx.area <= apt.maxArea)
    )
    .sort((a,b) => `${b.year}${b.month}${b.day}`.localeCompare(`${a.year}${a.month}${a.day}`));
}

// ═══════════════════════════════════════════════════════════════
//  통계
// ═══════════════════════════════════════════════════════════════
function calcStats(txs) {
  if (!txs || !txs.length) return null;
  const now = new Date();
  const thisYm = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;
  const prevD = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const prevYm = `${prevD.getFullYear()}${String(prevD.getMonth()+1).padStart(2,'0')}`;
  const thisM = txs.filter(t => `${t.year}${t.month}` === thisYm);
  const prevM = txs.filter(t => `${t.year}${t.month}` === prevYm);
  const avg = arr => arr.length ? Math.round(arr.reduce((s,t)=>s+t.price,0)/arr.length) : 0;
  const thisAvg = avg(thisM), prevAvg = avg(prevM);
  const diff = (thisM.length && prevM.length) ? thisAvg - prevAvg : null;
  return { latest: txs[0], thisAvg, prevAvg, diff, thisCount: thisM.length };
}

// ═══════════════════════════════════════════════════════════════
//  화면 전환
// ═══════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('fab').style.display = id === 'dashboard-screen' ? 'flex' : 'none';
}

// ═══════════════════════════════════════════════════════════════
//  API 키 설정
// ═══════════════════════════════════════════════════════════════
function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val) { toast('⚠ API 키를 입력해주세요'); return; }
  apiKey = val;
  localStorage.setItem('apt_apikey', apiKey);
  showScreen('dashboard-screen');
  renderGrid();
  if (apartments.length > 0) refreshAll();
}

function resetSetup() {
  if (!confirm('API 키를 재설정하시겠습니까?')) return;
  localStorage.removeItem('apt_apikey');
  apiKey = '';
  showScreen('setup-screen');
}

// ═══════════════════════════════════════════════════════════════
//  그리드 렌더링
// ═══════════════════════════════════════════════════════════════
function renderGrid() {
  const grid = document.getElementById('apt-grid');
  if (apartments.length === 0) {
    grid.innerHTML = `
      <div class="state-empty">
        <div class="state-empty-icon">🏠</div>
        <p class="state-empty-title">추적 중인 아파트가 없어요</p>
        <p class="state-empty-sub">+ 버튼으로 관심 아파트를 추가하세요</p>
      </div>`;
    return;
  }
  grid.innerHTML = apartments.map((apt, i) =>
    renderCard(apt, i)
  ).join('');
}

function renderCard(apt, delay = 0) {
  const txs = transactions[apt.id] || null;
  const newCnt = newCounts[apt.id] || 0;
  const stats = txs ? calcStats(txs) : null;
  const isLoading = !txs;

  const badge = newCnt > 0 ? `<span class="badge-new">NEW +${newCnt}</span>` : '';
  const tag = (apt.minArea || apt.maxArea)
    ? `<span class="tag">${apt.minArea||''}㎡ ~ ${apt.maxArea||''}㎡</span>` : '';

  let body = '';
  if (isLoading) {
    body = `<div class="card-loading"><span class="spinner"></span><br><br>조회중...</div>`;
  } else if (txs.length === 0) {
    body = `<div class="card-loading" style="color:var(--muted)">거래 내역 없음</div>`;
  } else if (!stats) {
    body = `<div class="card-loading" style="color:var(--muted)">데이터 없음</div>`;
  } else {
    const trendHtml = stats.diff !== null ? `
      <div class="trend-box">
        <div>
          <div class="trend-label">전월 대비 평균</div>
          <div class="trend-val ${stats.diff > 0 ? 'down-color' : stats.diff < 0 ? 'up-color' : 'neu-color'}">
            ${stats.diff > 0 ? '▲' : stats.diff < 0 ? '▼' : '─'} ${formatPrice(Math.abs(stats.diff))}
          </div>
        </div>
        <div style="text-align:right">
          <div class="trend-label">이번달 건수</div>
          <div class="trend-val blue-color">${stats.thisCount}건</div>
        </div>
      </div>` : '';

    body = `
      <div class="latest-label">최근 거래</div>
      <div class="latest-row">
        <span class="latest-price">${formatPrice(stats.latest.price)}</span>
        <span class="latest-date">${stats.latest.year}.${stats.latest.month}.${stats.latest.day}</span>
      </div>
      <div class="latest-detail">${formatArea(stats.latest.area)} · ${stats.latest.floor}층</div>
      ${trendHtml}
    `;
  }

  return `
    <div class="apt-card" style="animation-delay:${delay*0.05}s"
      onclick="openDetail('${apt.id}')">
      <div class="card-head">
        <div class="card-head-top">
          <div style="flex:1;min-width:0">
            <div style="min-height:18px">${badge}</div>
            <div class="card-apt-name">${apt.aptName}</div>
            <div class="card-region">${apt.regionName}</div>
          </div>
          <button class="card-remove" onclick="event.stopPropagation();removeApt('${apt.id}')" title="삭제">×</button>
        </div>
        ${tag}
      </div>
      <div class="card-body">${body}</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  새로고침
// ═══════════════════════════════════════════════════════════════
async function refreshAll() {
  if (isRefreshing || apartments.length === 0) return;
  isRefreshing = true;
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner spinner-sm"></span> 조회중...';

  for (const apt of apartments) {
    try {
      const txs = await fetchApt(apt);
      transactions[apt.id] = txs;
      const seen = lastSeen[apt.id] || new Set();
      const newOnes = txs.filter(tx => !seen.has(tx.id));
      newCounts[apt.id] = newOnes.length;
      lastSeen[apt.id] = new Set(txs.map(t => t.id));
    } catch(e) {
      console.error(apt.aptName, e);
      transactions[apt.id] = [];
      newCounts[apt.id] = 0;
      toast(`⚠ ${apt.aptName}: ${e.message}`, 5000);
    }
  }

  saveSeen();
  const now = new Date();
  document.getElementById('last-updated-label').textContent =
    `마지막 조회: ${now.toLocaleTimeString('ko-KR')}`;
  renderGrid();
  isRefreshing = false;
  btn.disabled = false;
  btn.innerHTML = '🔄 새로고침';
  toast('✅ 조회 완료!');
}

// ═══════════════════════════════════════════════════════════════
//  아파트 추가/삭제
// ═══════════════════════════════════════════════════════════════
function openAddModal() {
  populateRegions('');
  document.getElementById('apt-name-input').value = '';
  document.getElementById('min-area').value = '';
  document.getElementById('max-area').value = '';
  document.getElementById('region-search').value = '';
  openModal('add-modal');
}

async function addApartment() {
  const regionSel = document.getElementById('region-select');
  const name = document.getElementById('apt-name-input').value.trim();
  const minArea = document.getElementById('min-area').value;
  const maxArea = document.getElementById('max-area').value;

  if (!name) { toast('⚠ 아파트 이름을 입력해주세요'); return; }
  const region = REGIONS.find(r => r.code === regionSel.value);
  if (!region) { toast('⚠ 지역을 선택해주세요'); return; }

  const apt = {
    id: `${region.code}_${Date.now()}`,
    lawdCd: region.code, regionName: region.name, aptName: name,
    minArea: minArea ? parseFloat(minArea) : null,
    maxArea: maxArea ? parseFloat(maxArea) : null,
  };
  apartments.push(apt);
  saveApts();
  closeModal('add-modal');
  renderGrid();

  // 즉시 조회
  try {
    const txs = await fetchApt(apt);
    transactions[apt.id] = txs;
    const newOnes = txs.filter(tx => !(lastSeen[apt.id] || new Set()).has(tx.id));
    newCounts[apt.id] = newOnes.length;
    lastSeen[apt.id] = new Set(txs.map(t => t.id));
    saveSeen();
    document.getElementById('last-updated-label').textContent =
      `마지막 조회: ${new Date().toLocaleTimeString('ko-KR')}`;
    renderGrid();
    toast(`✅ ${name} 추가 완료! (${txs.length}건)`);
  } catch(e) {
    toast(`⚠ 조회 실패: ${e.message}`);
    transactions[apt.id] = [];
    renderGrid();
  }
}

function removeApt(aptId) {
  const apt = apartments.find(a => a.id === aptId);
  apartments = apartments.filter(a => a.id !== aptId);
  delete transactions[aptId];
  delete newCounts[aptId];
  saveApts();
  renderGrid();
}

// ═══════════════════════════════════════════════════════════════
//  상세 시트
// ═══════════════════════════════════════════════════════════════
function openDetail(aptId) {
  const apt = apartments.find(a => a.id === aptId);
  if (!apt) return;

  // mark read
  if ((newCounts[aptId] || 0) > 0) {
    newCounts[aptId] = 0;
    if (transactions[aptId]) {
      lastSeen[aptId] = new Set(transactions[aptId].map(t => t.id));
      saveSeen();
    }
    renderGrid();
  }

  document.getElementById('sheet-title').textContent = apt.aptName;
  document.getElementById('sheet-sub').textContent =
    `${apt.regionName} · 최근 3개월 실거래`;

  const txs = transactions[aptId] || [];
  const body = document.getElementById('sheet-body');
  if (txs.length === 0) {
    body.innerHTML = '<div class="tx-no">조회된 거래 내역이 없습니다</div>';
  } else {
    body.innerHTML = txs.map((tx, i) => {
      const prev = txs[i+1];
      const diff = prev ? tx.price - prev.price : null;
      const diffHtml = diff !== null
        ? `<div class="tx-diff ${diff>0?'down-color':diff<0?'up-color':'neu-color'}">
            ${diff>0?'▲':diff<0?'▼':'─'} ${formatPrice(Math.abs(diff))}
           </div>` : '';
      return `
        <div class="tx-row">
          <div>
            <div class="tx-date">${tx.year}.${tx.month}.${tx.day} · ${tx.floor}층</div>
            <div class="tx-detail">${formatArea(tx.area)}</div>
          </div>
          <div>
            <div class="tx-price">${formatPrice(tx.price)}</div>
            ${diffHtml}
          </div>
        </div>`;
    }).join('');
  }

  openModal('detail-sheet');
}

// ═══════════════════════════════════════════════════════════════
//  지역 셀렉트
// ═══════════════════════════════════════════════════════════════
function populateRegions(filter) {
  const sel = document.getElementById('region-select');
  const filtered = REGIONS.filter(r => !filter || r.name.includes(filter));
  sel.innerHTML = filtered.map(r =>
    `<option value="${r.code}">${r.name}</option>`
  ).join('');
}

function filterRegions() {
  const q = document.getElementById('region-search').value;
  populateRegions(q);
}

// ═══════════════════════════════════════════════════════════════
//  모달 헬퍼
// ═══════════════════════════════════════════════════════════════
function openModal(id) {
  const el = document.getElementById(id);
  el.style.display = 'flex';
  requestAnimationFrame(() => el.classList.add('show'));
}

function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('show');
  setTimeout(() => { el.style.display = 'none'; }, 220);
}

function backdropClose(e, id) {
  if (e.target === e.currentTarget) closeModal(id);
}

  apiKey = '11dd61957e19e1f4fd453a52a0fd3b35e83ec8696dc1d39030ac588e8c41b53b';
  localStorage.setItem('apt_apikey', apiKey);

  load();
  populateRegions('');
