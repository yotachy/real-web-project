<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏢 실거래가 모니터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#070b14;--card:#0e1320;--card2:#0b0f1c;--border:#1a2235;--border2:#2a3550;--accent:#e8b84b;--accent-dim:rgba(232,184,75,0.15);--text:#e2e8f0;--muted:#4a5568;--muted2:#718096;--up:#34d399;--down:#f87171;--blue:#60a5fa;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
  #dashboard-screen{padding:24px 24px 80px;max-width:1400px;margin:0 auto;}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:4px;}
  .header-title{font-size:20px;font-weight:900;}.header-title span{color:var(--accent);}
  .header-sub{font-size:11px;color:var(--muted);margin-top:3px;}
  /* 메인 2단 레이아웃 */
  .main-layout{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start;}
  .card-list{display:flex;flex-direction:column;gap:12px;}
  /* 우측 차트 패널 */
  .chart-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;position:sticky;top:24px;min-height:480px;display:flex;flex-direction:column;}
  .chart-panel-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--muted);gap:12px;}
  .chart-panel-empty-icon{font-size:40px;}
  .chart-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);}
  .chart-apt-name{font-size:16px;font-weight:700;}
  .chart-apt-sub{font-size:12px;color:var(--muted);margin-top:3px;}
  .chart-tabs{display:flex;gap:6px;padding:14px 20px 0;overflow-x:auto;}
  .chart-tab{background:none;border:1.5px solid var(--border);color:var(--muted2);padding:4px 13px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:all .15s;}
  .chart-tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
  .chart-body{padding:16px 20px 20px;flex:1;display:flex;flex-direction:column;}
  .chart-svg-wrap{flex:1;min-height:260px;}
  .chart-legend{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;}
  .chart-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted2);}
  .chart-legend-dot{width:8px;height:8px;border-radius:50%;}
  .chart-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
  .chart-stat{background:var(--card2);border-radius:8px;padding:10px 12px;text-align:center;}
  .chart-stat-label{font-size:10px;color:var(--muted);margin-bottom:4px;}
  .chart-stat-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
  /* 카드 선택 상태 */
  .apt-card.selected-a{border-color:#e8b84b !important;box-shadow:0 0 0 1px #e8b84b;}
  .apt-card.selected-b{border-color:#60a5fa !important;box-shadow:0 0 0 1px #60a5fa;}
  .apt-card.selected-c{border-color:#a78bfa !important;box-shadow:0 0 0 1px #a78bfa;}
  .apt-card.selected-a .card-apt-name::before{content:'① ';color:#e8b84b;}
  .apt-card.selected-b .card-apt-name::before{content:'② ';color:#60a5fa;}
  .apt-card.selected-c .card-apt-name::before{content:'③ ';color:#a78bfa;}
  .compare-hint{font-size:11px;color:var(--muted);text-align:center;padding:6px 0 10px;display:none;}
  .chart-stats-compare{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:14px;}
  .chart-stat-group{background:var(--card2);border-radius:10px;padding:12px 14px;}
  .chart-stat-group-title{font-size:11px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .color-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
  .chart-stat-row2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
  @media(max-width:900px){.main-layout{grid-template-columns:1fr;}.chart-panel{position:static;min-height:360px;}.card-list{max-height:none;}}
  .apt-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s;animation:fadeUp .35s ease both;}
  .apt-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3);}
  .card-head{padding:14px 16px 12px;border-bottom:1px solid var(--border);background:#09111e;}
  .card-head-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .card-apt-name{font-size:15px;font-weight:700;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
  .card-region{font-size:12px;color:var(--muted);margin-top:2px;}
  .card-body{padding:14px 16px;}
  .card-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:2px 4px;transition:color .15s;}
  .card-remove:hover{color:var(--down);}
  .pyeong-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
  .pyeong-tag{font-size:11px;background:#131a28;color:var(--muted2);padding:2px 9px;border-radius:99px;}
  .pyeong-section{padding:10px 0;border-bottom:1px solid var(--border);}
  .pyeong-section:last-child{border-bottom:none;padding-bottom:0;}
  .pyeong-label{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:8px;}
  .latest-price{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;}
  .latest-meta{font-size:11px;color:var(--muted);margin-top:2px;}
  .stat-box{background:var(--card2);border-radius:8px;padding:8px 12px;margin-top:8px;display:flex;justify-content:space-between;}
  .stat-item{text-align:center;}
  .stat-label{font-size:10px;color:var(--muted);margin-bottom:3px;}
  .stat-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
  .no-data{font-size:12px;color:var(--muted);padding:8px 0;}
  .badge-new{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(232,184,75,.4);animation:pulse 2s infinite;}
  .btn-primary{background:var(--accent);color:#0a0a0a;border:none;padding:11px 22px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .15s;width:100%;}
  .btn-primary:hover{opacity:.88;}
  .btn-ghost{background:transparent;color:var(--muted2);border:1px solid var(--border);padding:9px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .btn-ghost:disabled{opacity:.5;cursor:not-allowed;}
  .pyeong-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .pyeong-btn{
    background:#0d1422;border:1.5px solid var(--border);color:var(--muted);
    padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;transition:all .15s;
    position:relative;
  }
  .pyeong-btn:hover:not([style*="none"]){border-color:var(--border2);color:var(--muted2);}
  .pyeong-btn.active{
    background:var(--accent);border-color:var(--accent);
    color:#000;font-weight:700;
    box-shadow:0 2px 10px rgba(232,184,75,0.35);
  }
  .pyeong-btn.active::after{
    content:'✓';margin-left:5px;font-size:12px;
  }
  .pyeong-hint{font-size:11px;color:var(--muted);margin-top:8px;}
  #fab{position:fixed;bottom:28px;right:24px;width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;font-size:26px;cursor:pointer;color:#000;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(232,184,75,.45);transition:transform .15s;z-index:10;}
  #fab:hover{transform:scale(1.1);}
  .form-label{font-size:12px;color:var(--muted);display:block;margin-bottom:8px;}
  .form-label .req{color:var(--down);}
  .form-group{margin-bottom:18px;}
  input[type=text],select{background:#07090f;border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:9px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;width:100%;}
  input[type=text]:focus,select:focus{border-color:var(--accent);}
  input::placeholder{color:var(--muted);}
  .form-hint{font-size:11px;color:var(--muted);margin-top:5px;}
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;opacity:0;transition:opacity .2s;}
  .modal-backdrop.show{opacity:1;}
  .modal-box{background:var(--card);border:1px solid var(--border);border-radius:18px;width:100%;max-width:440px;padding:28px;animation:fadeUp .25s ease;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
  .modal-title{font-size:18px;font-weight:700;}
  .modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;transition:color .15s;}
  .modal-close:hover{color:var(--text);}
  .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;z-index:200;opacity:0;transition:opacity .2s;}
  .sheet-backdrop.show{opacity:1;}
  .sheet-box{background:var(--card);border:1px solid var(--border);border-radius:18px 18px 0 0;border-bottom:none;width:100%;max-width:640px;max-height:85vh;display:flex;flex-direction:column;transform:translateY(30px);transition:transform .25s ease;}
  .sheet-backdrop.show .sheet-box{transform:translateY(0);}
  .sheet-head{padding:20px 24px 0;border-bottom:1px solid var(--border);flex-shrink:0;}
  .sheet-head-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;}
  .sheet-title{font-size:17px;font-weight:700;}
  .sheet-sub{font-size:12px;color:var(--muted);margin-top:3px;}
  .sheet-body{overflow-y:auto;flex:1;padding:0 24px 32px;}
  .detail-tabs{display:flex;gap:8px;padding:12px 0;overflow-x:auto;}
  .detail-tab{background:none;border:1.5px solid var(--border);color:var(--muted2);padding:5px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:all .15s;}
  .detail-tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
  .tx-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);}
  .tx-row:last-child{border-bottom:none;}
  .tx-date{font-size:13px;color:var(--muted2);}
  .tx-detail{font-size:12px;color:var(--muted);margin-top:2px;}
  .tx-price{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;text-align:right;}
  .tx-diff{font-family:'IBM Plex Mono',monospace;font-size:11px;margin-top:2px;text-align:right;}
  .tx-no{color:var(--muted);text-align:center;padding:40px 0;font-size:13px;}
  .state-empty{text-align:center;padding:80px 20px;color:var(--muted);}
  .card-loading{text-align:center;padding:28px 0;color:var(--muted);font-size:13px;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;}
  .up-color{color:var(--up);}.down-color{color:var(--down);}.neu-color{color:var(--muted2);}
  #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a2235;border:1px solid var(--border2);color:var(--text);padding:10px 20px;border-radius:99px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
  #toast.show{opacity:1;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  select option{background:#0e1320;}
  .apt-select-item{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .15s;background:#0a0f1c;}
  .apt-select-item:hover{border-color:var(--accent);background:var(--accent-dim);}
  .apt-select-item:last-child{margin-bottom:0;}
  .apt-select-name{font-size:14px;font-weight:600;}
  .apt-select-count{font-size:12px;color:var(--muted);}
  .autocomplete-wrap{position:relative;}
  .autocomplete-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#0e1320;border:1px solid var(--border2);border-radius:10px;z-index:300;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5);}
  .autocomplete-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border);}
  .autocomplete-item:last-child{border-bottom:none;}
  .autocomplete-item:hover,.autocomplete-item.focused{background:var(--accent-dim);}
  .autocomplete-item-name{font-size:13px;font-weight:600;color:var(--text);}
  .autocomplete-item-count{font-size:11px;color:var(--muted);margin-left:8px;flex-shrink:0;}
  .autocomplete-searching{padding:12px 14px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;}
  .period-btns{display:flex;gap:6px;}
  .period-btn{background:transparent;border:1.5px solid var(--border);color:var(--muted2);padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
  .period-btn:hover{border-color:var(--border2);color:var(--text);}
  .period-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
  @media(max-width:480px){#dashboard-screen{padding:16px 12px 80px;}.header-title{font-size:17px;}.period-btn{padding:6px 10px;font-size:12px;}}
</style>
</head>
<body>
<div id="dashboard-screen">
  <div class="header">
    <div>
      <div class="header-title"><span>실거래가</span> 모니터</div>
      <div class="header-sub" id="last-updated-label">아파트를 추가해서 추적을 시작하세요</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;">
      <div class="period-btns">
        <button class="period-btn active" data-months="3" onclick="setPeriod(this)">3개월</button>
        <button class="period-btn" data-months="6" onclick="setPeriod(this)">6개월</button>
        <button class="period-btn" data-months="12" onclick="setPeriod(this)">1년</button>
        <button class="period-btn" data-months="60" onclick="setPeriod(this)">5년</button>
      </div>
      <button class="btn-ghost" id="refresh-btn" onclick="refreshAll()">🔄 새로고침</button>
    </div>
  </div>
  <div class="main-layout">
    <div class="card-list" id="apt-grid"></div>
    <div class="chart-panel" id="chart-panel">
      <div class="chart-panel-empty" id="chart-empty">
        <div class="chart-panel-empty-icon">📈</div>
        <p style="font-size:14px;font-weight:600">아파트를 선택하세요</p>
        <p style="font-size:12px">카드를 클릭하면 실거래 그래프가 표시돼요</p>
      </div>
      <div id="chart-content" style="display:none;flex-direction:column;flex:1;">
        <div class="chart-header">
          <div class="chart-apt-name" id="chart-apt-name">-</div>
          <div class="chart-apt-sub" id="chart-apt-sub">-</div>
        </div>
        <div class="chart-tabs" id="chart-tabs"></div>
        <div class="compare-hint" id="compare-hint">💡 다른 아파트 카드를 클릭하면 최대 3개까지 비교할 수 있어요</div>
        <div class="chart-body">
          <div class="chart-svg-wrap" id="chart-svg-wrap"></div>
          <div class="chart-stats-row" id="chart-stats-row"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<button id="fab" onclick="openAddModal()">+</button>

<!-- ADD MODAL -->
<div class="modal-backdrop" id="add-modal" onclick="backdropClose(event,'add-modal')">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title">아파트 추가</span>
      <button class="modal-close" onclick="closeModal('add-modal')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">시군구 선택 <span class="req">*</span></label>
      <select id="region-select" style="height:44px"></select>
    </div>
    <div class="form-group">
      <label class="form-label">아파트 이름 <span class="req">*</span></label>
      <div class="autocomplete-wrap">
        <input type="text" id="apt-name-input" placeholder="먼저 시군구를 선택해주세요"
          oninput="onAptNameInput(this.value)"
          onkeydown="onAptNameKeydown(event)"
          autocomplete="off" disabled
          style="opacity:0.4;cursor:not-allowed;">
        <div class="autocomplete-list" id="autocomplete-list" style="display:none"></div>
      </div>
      <p class="form-hint" id="apt-name-hint">지역 선택 후 이름을 입력하면 자동검색됩니다</p>
    </div>
    <div class="form-group">
      <label class="form-label">평형 선택 <span class="req">*</span> <span style="color:var(--muted);font-weight:400">(최대 2개)</span></label>
      <div class="pyeong-btns">
        <button class="pyeong-btn" data-key="10" onclick="togglePyeong(this)">10평대</button>
        <button class="pyeong-btn" data-key="20" onclick="togglePyeong(this)">20평대</button>
        <button class="pyeong-btn" data-key="30" onclick="togglePyeong(this)">30평대</button>
        <button class="pyeong-btn" data-key="40" onclick="togglePyeong(this)">40평대</button>
        <button class="pyeong-btn" data-key="50" onclick="togglePyeong(this)">50평이상</button>
      </div>
      <p class="pyeong-hint" id="pyeong-hint">1개 이상 선택해주세요</p>
    </div>
    <button class="btn-primary" onclick="addApartment()">추가하기</button>
  </div>
</div>

<!-- APT SELECT MODAL -->
<div class="modal-backdrop" id="select-modal" onclick="backdropClose(event,'select-modal')">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title">아파트 선택</span>
      <button class="modal-close" onclick="closeModal('select-modal')">×</button>
    </div>
    <p style="font-size:13px;color:var(--muted2);margin-bottom:16px">검색된 아파트 목록이에요. 등록할 아파트를 선택해주세요.</p>
    <div id="apt-select-list"></div>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="sheet-backdrop" id="detail-sheet" onclick="backdropClose(event,'detail-sheet')">
  <div class="sheet-box">
    <div class="sheet-head">
      <div class="sheet-head-top">
        <div>
          <div class="sheet-title" id="sheet-title">-</div>
          <div class="sheet-sub" id="sheet-sub">-</div>
        </div>
        <button class="modal-close" onclick="closeModal('detail-sheet')">×</button>
      </div>
      <div class="detail-tabs" id="detail-tabs"></div>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const PYEONG_DEFS = {
  '10':{label:'10평대',  minM2:0,   maxM2:49},
  '20':{label:'20평대',  minM2:49,  maxM2:76},
  '30':{label:'30평대',  minM2:76,  maxM2:99},
  '40':{label:'40평대',  minM2:99,  maxM2:132},
  '50':{label:'50평이상',minM2:132, maxM2:9999},
};

function getLastNMonths(n){
  const r=[];const now=new Date();
  for(let i=0;i<n;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);r.push(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}`);}
  return r;
}
function formatPrice(v){
  if(!v)return'-';const e=Math.floor(v/10000),m=v%10000;
  if(e>0&&m>0)return `${e}억 ${m.toLocaleString()}만`;
  if(e>0)return `${e}억`;return `${v.toLocaleString()}만`;
}
function pyeongStr(m2){return `${(m2/3.3058).toFixed(0)}평`;}

async function fetchMonthData(lawdCd,dealYmd){
  const res=await fetch(`/proxy?LAWD_CD=${lawdCd}&DEAL_YMD=${dealYmd}`);
  if(!res.ok) throw new Error(`서버 오류 ${res.status}`);
  return parseXML(await res.text());
}
function parseXML(xmlStr){
  const doc=new DOMParser().parseFromString(xmlStr,'text/xml');
  const code=doc.querySelector('resultCode')?.textContent?.trim();
  if(code&&code!=='000'&&code!=='00'){
    throw new Error(`API 오류(${code}): ${doc.querySelector('resultMsg')?.textContent?.trim()||'오류'}`);
  }
  const items=doc.querySelectorAll('item');
  if(!items.length) return [];
  return Array.from(items).map(item=>{
    const g=tag=>item.getElementsByTagName(tag)[0]?.textContent?.trim()||'';
    const price=parseInt(g('dealAmount').replace(/,/g,'').replace(/\s/g,''))||0;
    const yr=g('dealYear'),mo=g('dealMonth').padStart(2,'0'),dy=g('dealDay').padStart(2,'0');
    return{aptName:g('aptNm'),area:parseFloat(g('excluUseAr'))||0,floor:g('floor'),price,year:yr,month:mo,day:dy,
      cancelled:g('cdealType').trim(),id:`${g('aptNm')}_${yr}${mo}${dy}_F${g('floor')}_${g('excluUseAr')}`};
  }).filter(t=>t.cancelled!=='해제'&&t.price>0&&t.aptName);
}
async function fetchApt(apt){
  const months=getLastNMonths(currentPeriod);const all=[];
  for(const ym of months){const txs=await fetchMonthData(apt.lawdCd,ym);all.push(...txs);}
  const matched=all.filter(tx=>tx.aptName.includes(apt.aptName));
  const result={};
  for(const p of apt.pyeongs){
    const def=PYEONG_DEFS[p];
    result[p]=matched.filter(tx=>tx.area>=def.minM2&&tx.area<def.maxM2)
      .sort((a,b)=>`${b.year}${b.month}${b.day}`.localeCompare(`${a.year}${a.month}${a.day}`));
  }
  return result;
}
function calcStats(txs){
  if(!txs||!txs.length) return null;
  const latest=txs[0];
  const minPrice=Math.min(...txs.map(t=>t.price));
  const prev=txs[1];
  const change=prev?((latest.price-prev.price)/prev.price*100):null;
  return{latest,minPrice,change,count:txs.length};
}

function renderCard(apt,delay=0){
  const txMap=transactions[apt.id];
  const newCnt=newCounts[apt.id]||0;
  const badge=newCnt>0?`<span class="badge-new">NEW +${newCnt}</span>`:'';
  const ptags=apt.pyeongs.map(p=>`<span class="pyeong-tag">${PYEONG_DEFS[p].label}</span>`).join('');
  let body='';
  if(!txMap){
    body=`<div class="card-loading"><span class="spinner"></span><br><br>조회중...</div>`;
  }else{
    body=apt.pyeongs.map(p=>{
      const txs=txMap[p]||[];const stats=calcStats(txs);
      if(!stats) return `<div class="pyeong-section"><div class="pyeong-label">${PYEONG_DEFS[p].label}</div><div class="no-data">거래 내역 없음</div></div>`;
      const cc=stats.change===null?'neu-color':stats.change>0?'down-color':'up-color';
      const cs=stats.change===null?'-':`${stats.change>0?'▲':'▼'} ${Math.abs(stats.change).toFixed(1)}%`;
      return `<div class="pyeong-section">
        <div class="pyeong-label">${PYEONG_DEFS[p].label} <span style="font-size:10px;color:var(--muted);font-weight:400">${currentPeriod >= 12 ? (currentPeriod/12)+'년' : currentPeriod+'개월'} ${stats.count}건</span></div>
        <div class="latest-price">${formatPrice(stats.latest.price)}</div>
        <div class="latest-meta">${pyeongStr(stats.latest.area)} · ${stats.latest.floor}층 · ${stats.latest.year}.${stats.latest.month}.${stats.latest.day}</div>
        <div class="stat-box">
          <div class="stat-item"><div class="stat-label">${currentPeriod >= 12 ? (currentPeriod/12)+'년' : currentPeriod+'개월'} 최저가</div><div class="stat-val up-color">${formatPrice(stats.minPrice)}</div></div>
          <div class="stat-item"><div class="stat-label">직전 대비</div><div class="stat-val ${cc}">${cs}</div></div>
        </div></div>`;
    }).join('');
  }
  return `<div class="apt-card" style="animation-delay:${delay*.05}s" id="card-${apt.id}" onclick="selectCard('${apt.id}')">
    <div class="card-head">
      <div class="card-head-top">
        <div style="flex:1;min-width:0"><div style="min-height:18px">${badge}</div>
          <div class="card-apt-name">${apt.aptName}</div>
          <div class="card-region">${apt.regionName}</div></div>
        <button class="card-remove" onclick="event.stopPropagation();removeApt('${apt.id}')">×</button>
      </div>
      <div class="pyeong-tags">${ptags}</div>
    </div>
    <div class="card-body">${body}</div></div>`;
}

let acCache = {};      // regionCode → 전체 tx 캐시
let acTimer = null;

async function onAptNameInput(val) {
  const hint = document.getElementById('apt-name-hint');
  const list = document.getElementById('autocomplete-list');
  clearTimeout(acTimer);
  acFocusIdx = -1;

  if (!val.trim()) {
    list.style.display = 'none';
    hint.textContent = '지역 선택 후 이름을 입력하면 자동검색됩니다';
    hint.style.color = 'var(--muted)';
    return;
  }
  if (val.trim().length < 2) {
    list.style.display = 'none';
    hint.textContent = '한 글자 더 입력해주세요';
    hint.style.color = 'var(--muted)';
    return;
  }

  const regionCode = document.getElementById('region-select').value;

  // 로딩 표시
  list.style.display = 'block';
  list.innerHTML = `<div class="autocomplete-searching"><span class="spinner" style="width:12px;height:12px;border-width:2px"></span> 검색중...</div>`;

  acTimer = setTimeout(async () => {
    try {
      // 캐시 없으면 API 조회 (3개월치)
      if (!acCache[regionCode]) {
        const months = getLastNMonths(currentPeriod);
        const all = [];
        for (const ym of months) {
          const txs = await fetchMonthData(regionCode, ym);
          all.push(...txs);
        }
        acCache[regionCode] = all;
      }

      const allTxs = acCache[regionCode];
      const keyword = val.trim();

      // 매칭 아파트명 + 건수 집계
      const nameMap = {};
      allTxs.filter(tx => tx.aptName.includes(keyword)).forEach(tx => {
        nameMap[tx.aptName] = (nameMap[tx.aptName] || 0) + 1;
      });
      acResults = Object.entries(nameMap)
        .map(([name, count]) => ({name, count}))
        .sort((a, b) => b.count - a.count);

      if (!acResults.length) {
        list.innerHTML = `<div class="autocomplete-searching" style="color:var(--muted)">검색 결과가 없어요</div>`;
        return;
      }

      renderAcList();
    } catch(e) {
      list.innerHTML = `<div class="autocomplete-searching" style="color:var(--down)">조회 실패: ${e.message}</div>`;
    }
  }, 350);
}

function renderAcList() {
  const list = document.getElementById('autocomplete-list');
  list.style.display = 'block';
  list.innerHTML = acResults.map((r, i) => `
    <div class="autocomplete-item${i === acFocusIdx ? ' focused' : ''}"
      onmousedown="selectAcItem(${i})">
      <span class="autocomplete-item-name">${r.name}</span>
      <span class="autocomplete-item-count">${r.count}건</span>
    </div>`).join('');
}

function selectAcItem(idx) {
  const item = acResults[idx];
  if (!item) return;
  document.getElementById('apt-name-input').value = item.name;
  document.getElementById('autocomplete-list').style.display = 'none';
  const hint = document.getElementById('apt-name-hint');
  hint.textContent = '✓ 선택됨';
  hint.style.color = 'var(--accent)';
  acResults = [];
}

function onAptNameKeydown(e) {
  const list = document.getElementById('autocomplete-list');
  if (list.style.display === 'none' || !acResults.length) {
    if (e.key === 'Enter') addApartment();
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acFocusIdx = Math.min(acFocusIdx + 1, acResults.length - 1);
    renderAcList();
    list.querySelectorAll('.autocomplete-item')[acFocusIdx]?.scrollIntoView({block:'nearest'});
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acFocusIdx = Math.max(acFocusIdx - 1, -1);
    renderAcList();
    if (acFocusIdx >= 0) list.querySelectorAll('.autocomplete-item')[acFocusIdx]?.scrollIntoView({block:'nearest'});
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acFocusIdx >= 0) selectAcItem(acFocusIdx);
    else addApartment();
  } else if (e.key === 'Escape') {
    list.style.display = 'none';
  }
}

async function addApartment(){
  const exactName = document.getElementById('apt-name-input').value.trim();
  if(!exactName){toast('⚠ 아파트를 검색 후 선택해주세요');return;}
  if(!selectedPyeongs.length){toast('⚠ 평형을 1개 이상 선택해주세요');return;}
  const region=REGIONS.find(r=>r.code===document.getElementById('region-select').value);

  // 캐시된 데이터 사용, 없으면 재조회
  let allTxs = acCache[region.code];
  if(!allTxs){
    const btn=document.querySelector('#add-modal .btn-primary');
    btn.disabled=true;btn.innerHTML='<span class="spinner" style="width:13px;height:13px;border-width:2px"></span> 조회중...';
    try{
      const months=getLastNMonths(currentPeriod);allTxs=[];
      for(const ym of months){allTxs.push(...await fetchMonthData(region.code,ym));}
      acCache[region.code]=allTxs;
    }catch(e){toast(`⚠ 조회 실패: ${e.message}`,5000);btn.disabled=false;btn.innerHTML='추가하기';return;}
    btn.disabled=false;btn.innerHTML='추가하기';
  }

  // 정확한 이름으로 등록
  const apt={id:`${region.code}_${Date.now()}`,lawdCd:region.code,regionName:region.name,aptName:exactName,pyeongs:[...selectedPyeongs]};
  apartments.push(apt);saveApts();closeModal('add-modal');renderGrid();

  const result={};
  for(const p of selectedPyeongs){
    const def=PYEONG_DEFS[p];
    result[p]=allTxs
      .filter(tx=>tx.aptName===exactName && tx.area>=def.minM2 && tx.area<def.maxM2)
      .sort((a,b)=>`${b.year}${b.month}${b.day}`.localeCompare(`${a.year}${a.month}${a.day}`));
  }
  transactions[apt.id]=result;
  const flat=Object.values(result).flat();
  newCounts[apt.id]=flat.length;
  lastSeen[apt.id]=new Set(flat.map(t=>t.id));
  saveSeen();
  document.getElementById('last-updated-label').textContent=`마지막 조회: ${new Date().toLocaleTimeString('ko-KR')}`;
  renderGrid();toast(`✅ ${exactName} 추가 완료!`);
  setTimeout(()=>selectCard(apt.id),100);
}

function setPeriod(btn) {
  const months = parseInt(btn.dataset.months);
  if (months === currentPeriod) return;
  currentPeriod = months;

  // 버튼 상태
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // 캐시 무효화 → 새 기간으로 재조회
  acCache = {};
  Object.keys(transactions).forEach(k => delete transactions[k]);
  renderGrid();

  if (apartments.length > 0) refreshAll();
}

let chartActivePyeong = null;

function selectCard(aptId) {
  const idx = selectedAptIds.indexOf(aptId);
  if (idx !== -1) {
    // 이미 선택된 카드 → 해제
    selectedAptIds.splice(idx, 1);
  } else {
    if (selectedAptIds.length >= 3) {
      // 3개 이미 선택 → 첫번째 교체
      selectedAptIds.shift();
    }
    selectedAptIds.push(aptId);
  }

  // 카드 하이라이트 초기화 후 재적용
  document.querySelectorAll('.apt-card').forEach(c => {
    c.classList.remove('selected-a','selected-b','selected-c');
  });
  selectedAptIds.forEach((id, i) => {
    const card = document.getElementById('card-' + id);
    if (card) card.classList.add(CHART_COLORS[i].cls);
  });

  // 패널 업데이트
  if (!selectedAptIds.length) {
    document.getElementById('chart-empty').style.display = 'flex';
    document.getElementById('chart-content').style.display = 'none';
    return;
  }

  document.getElementById('chart-empty').style.display = 'none';
  document.getElementById('chart-content').style.display = 'flex';

  // 헤더 텍스트
  const names = selectedAptIds.map(id => apartments.find(a=>a.id===id)?.aptName || '').filter(Boolean);
  document.getElementById('chart-apt-name').textContent = names.join(' vs ');
  document.getElementById('chart-apt-sub').textContent = `최근 ${currentPeriod >= 12 ? (currentPeriod/12)+'년' : currentPeriod+'개월'} 실거래 비교`;

  // 비교 힌트
  const hint = document.getElementById('compare-hint');
  hint.style.display = selectedAptIds.length === 1 ? 'block' : 'none';

  // 탭: 선택된 아파트들의 모든 평형 합집합
  const allPyeongs = [...new Set(selectedAptIds.flatMap(id => {
    const apt = apartments.find(a=>a.id===id);
    return apt ? apt.pyeongs : [];
  }))].sort();

  if (!chartActivePyeong || !allPyeongs.includes(chartActivePyeong)) {
    chartActivePyeong = allPyeongs[0];
  }

  document.getElementById('chart-tabs').innerHTML = allPyeongs.map(p =>
    `<button class="chart-tab${p === chartActivePyeong ? ' active' : ''}"
      onclick="switchChartTab('${p}',this)">${PYEONG_DEFS[p].label}</button>`
  ).join('');

  renderChart(chartActivePyeong);
}

function switchChartTab(p, btn) {
  document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  chartActivePyeong = p;
  renderChart(p);
}

function renderChart(pyeong) {
  const wrap = document.getElementById('chart-svg-wrap');
  const statsRow = document.getElementById('chart-stats-row');
  if (!selectedAptIds.length) return;

  // 각 아파트별 데이터 준비 (날짜순 정렬)
  const series = selectedAptIds.map((id, si) => {
    const apt = apartments.find(a=>a.id===id);
    const txMap = transactions[id] || {};
    const txs = apt?.pyeongs.includes(pyeong)
      ? (txMap[pyeong] || []).slice().reverse()
      : [];
    return { id, apt, txs, color: CHART_COLORS[si] };
  });

  const allTxs = series.flatMap(s => s.txs);
  if (!allTxs.length) {
    wrap.innerHTML = `<div style="height:240px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px">선택한 평형의 거래 내역 없음</div>`;
    statsRow.innerHTML = '';
    return;
  }

  // 전체 날짜 범위 계산 (3개월 고정)
  const now = new Date();
  const startDate = new Date(now.getFullYear(), now.getMonth()-(currentPeriod-1), 1);
  const endDate = now;
  const totalDays = Math.max((endDate - startDate) / 86400000, 1);

  function dateToX(tx, cw, padL) {
    const d = new Date(+tx.year, +tx.month-1, +tx.day);
    const ratio = Math.max(0, Math.min(1, (d - startDate) / (endDate - startDate)));
    return padL + ratio * cw;
  }

  // 전체 가격 범위
  const allPrices = allTxs.map(t=>t.price);
  const globalMax = Math.max(...allPrices);
  const globalMin = Math.min(...allPrices);
  const priceRange = globalMax - globalMin || globalMax * 0.1 || 1;
  // 여백 10%
  const yMin = globalMin - priceRange * 0.1;
  const yMax = globalMax + priceRange * 0.1;
  const yRange = yMax - yMin;

  const W = wrap.clientWidth || 520, H = 260;
  const pad = {t:24, r:20, b:44, l:78};
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;

  function priceToY(price) {
    return pad.t + ch - ((price - yMin) / yRange * ch);
  }

  // 그리드 & Y축
  const gridCount = 5;
  const gridLines = Array.from({length:gridCount}, (_,i) => {
    const r = i/(gridCount-1);
    const price = yMin + yRange * r;
    const y = pad.t + ch - r*ch;
    return `
      <line x1="${pad.l}" y1="${y.toFixed(1)}" x2="${W-pad.r}" y2="${y.toFixed(1)}" stroke="#1a2235" stroke-width="1" stroke-dasharray="${i===0?'none':'4,3'}"/>
      <text x="${pad.l-6}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="#4a5568" font-size="10" font-family="IBM Plex Mono">${formatPrice(Math.round(price))}</text>`;
  }).join('');

  // X축: 월 기준으로 눈금
  const xAxisLabels = [];
  const tickCount = currentPeriod <= 3 ? currentPeriod : currentPeriod <= 12 ? Math.ceil(currentPeriod/2) : Math.ceil(currentPeriod/12);
  for (let m=0; m<=tickCount; m++) {
    const d = new Date(now.getFullYear(), now.getMonth()-(currentPeriod-1)+Math.round((currentPeriod/tickCount)*m), 1);
    const ratio = Math.max(0, Math.min(1, (d - startDate)/(endDate-startDate)));
    const x = pad.l + ratio * cw;
    xAxisLabels.push(`<text x="${x.toFixed(1)}" y="${H-6}" text-anchor="middle" fill="#4a5568" font-size="10">${d.getMonth()+1}월</text>`);
    xAxisLabels.push(`<line x1="${x.toFixed(1)}" y1="${pad.t}" x2="${x.toFixed(1)}" y2="${(pad.t+ch).toFixed(1)}" stroke="#1a2235" stroke-width="1" stroke-dasharray="4,3"/>`);
  }

  // 각 시리즈 SVG 생성
  const defs = [];
  const paths = [];
  const dots = [];

  series.forEach((s, si) => {
    if (!s.txs.length) return;
    const c = s.color;
    const gradId = `grad${si}`;
    defs.push(`
      <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${c.line}" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="${c.line}" stop-opacity="0"/>
      </linearGradient>`);

    const pts = s.txs.map(tx => ({
      x: dateToX(tx, cw, pad.l),
      y: priceToY(tx.price),
      tx,
    }));

    const linePath = pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
    const areaPath = pts.length > 1
      ? `${linePath} L${pts[pts.length-1].x.toFixed(1)},${(pad.t+ch).toFixed(1)} L${pts[0].x.toFixed(1)},${(pad.t+ch).toFixed(1)} Z`
      : '';

    if (areaPath) paths.push(`<path d="${areaPath}" fill="url(#${gradId})"/>`);
    paths.push(`<path d="${linePath}" fill="none" stroke="${c.line}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`);

    pts.forEach(p => {
      const tip = `${s.apt?.aptName} · ${formatPrice(p.tx.price)} · ${p.tx.month}/${p.tx.day} · ${p.tx.floor}층`;
      dots.push(`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${pts.length===1?6:4}" fill="${c.line}" stroke="#070b14" stroke-width="2"
        onmouseenter="showChartTooltip(event,${JSON.stringify(tip)})"
        onmouseleave="hideChartTooltip()"/>`);
    });
  });

  wrap.innerHTML = `
    <svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block">
      <defs>${defs.join('')}</defs>
      ${gridLines}
      ${xAxisLabels.join('')}
      <line x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${(pad.t+ch).toFixed(1)}" stroke="#2a3550" stroke-width="1"/>
      <line x1="${pad.l}" y1="${(pad.t+ch).toFixed(1)}" x2="${(W-pad.r).toFixed(1)}" y2="${(pad.t+ch).toFixed(1)}" stroke="#2a3550" stroke-width="1"/>
      ${paths.join('')}
      ${dots.join('')}
    </svg>
    <div id="chart-tooltip" style="position:fixed;display:none;background:#1a2235;border:1px solid #2a3550;border-radius:8px;padding:7px 12px;font-size:12px;color:#e2e8f0;pointer-events:none;z-index:999;white-space:nowrap;font-family:'IBM Plex Mono',monospace;box-shadow:0 4px 16px rgba(0,0,0,.5)"></div>`;

  // 통계 렌더
  const isCompare = selectedAptIds.length > 1;
  if (isCompare) {
    statsRow.className = 'chart-stats-compare';
    statsRow.innerHTML = series.map((s, si) => {
      if (!s.txs.length) return `
        <div class="chart-stat-group">
          <div class="chart-stat-group-title">
            <span class="color-dot" style="background:${s.color.line}"></span>
            ${s.apt?.aptName}
          </div>
          <div style="font-size:12px;color:var(--muted)">해당 평형 거래 없음</div>
        </div>`;
      const prices = s.txs.map(t=>t.price);
      const latest = s.txs[s.txs.length-1];
      const prev2 = s.txs.length>1 ? s.txs[s.txs.length-2] : null;
      const chg = prev2 ? ((latest.price-prev2.price)/prev2.price*100) : null;
      const cc = chg===null?'#718096':chg>0?'#f87171':'#34d399';
      return `
        <div class="chart-stat-group">
          <div class="chart-stat-group-title">
            <span class="color-dot" style="background:${s.color.line}"></span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.apt?.aptName}</span>
          </div>
          <div class="chart-stat-row2">
            <div><div class="stat-label" style="font-size:10px;color:var(--muted);margin-bottom:3px">최근 실거래</div>
              <div class="stat-val" style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600">${formatPrice(latest.price)}</div></div>
            <div><div class="stat-label" style="font-size:10px;color:var(--muted);margin-bottom:3px">${currentPeriod>=12?(currentPeriod/12)+'년':currentPeriod+'개월'} 최저</div>
              <div class="stat-val" style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#34d399">${formatPrice(Math.min(...prices))}</div></div>
            <div><div class="stat-label" style="font-size:10px;color:var(--muted);margin-bottom:3px">거래 건수</div>
              <div class="stat-val" style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#60a5fa">${s.txs.length}건</div></div>
            <div><div class="stat-label" style="font-size:10px;color:var(--muted);margin-bottom:3px">직전 대비</div>
              <div class="stat-val" style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:${cc}">${chg===null?'-':(chg>0?'▲':'▼')+Math.abs(chg).toFixed(1)+'%'}</div></div>
          </div>
        </div>`;
    }).join('');
  } else {
    statsRow.className = 'chart-stats-row';
    const s = series[0];
    if (!s.txs.length) { statsRow.innerHTML=''; return; }
    const prices = s.txs.map(t=>t.price);
    const latest = s.txs[s.txs.length-1];
    const prev2 = s.txs.length>1?s.txs[s.txs.length-2]:null;
    const chg = prev2?((latest.price-prev2.price)/prev2.price*100):null;
    const cc = chg===null?'#718096':chg>0?'#f87171':'#34d399';
    statsRow.innerHTML = `
      <div class="chart-stat"><div class="chart-stat-label">최근 실거래</div><div class="chart-stat-val">${formatPrice(latest.price)}</div></div>
      <div class="chart-stat"><div class="chart-stat-label">${currentPeriod>=12?(currentPeriod/12)+'년':currentPeriod+'개월'} 최저</div><div class="chart-stat-val up-color">${formatPrice(Math.min(...prices))}</div></div>
      <div class="chart-stat"><div class="chart-stat-label">직전 대비</div><div class="chart-stat-val" style="color:${cc}">${chg===null?'-':(chg>0?'▲':'▼')+Math.abs(chg).toFixed(1)+'%'}</div></div>`;
  }
}

function showChartTooltip(e, text) {
  const tt = document.getElementById('chart-tooltip');
  if(!tt) return;
  tt.textContent = text;
  tt.style.display = 'block';
  tt.style.left = (e.clientX + 14) + 'px';
  tt.style.top = (e.clientY - 36) + 'px';
}
function hideChartTooltip() {
  const tt = document.getElementById('chart-tooltip');
  if (tt) tt.style.display = 'none';
}

function removeApt(aptId) {
  apartments=apartments.filter(a=>a.id!==aptId);delete transactions[aptId];delete newCounts[aptId];
  if(selectedAptIds.includes(aptId)){
    selectedAptIds = selectedAptIds.filter(id=>id!==aptId);
    document.querySelectorAll('.apt-card').forEach(c=>c.classList.remove('selected-a','selected-b'));
    selectedAptIds.forEach((id,i)=>{
      const card=document.getElementById('card-'+id);
      if(card) card.classList.add(CHART_COLORS[i].cls);
    });
    if(!selectedAptIds.length){
      document.getElementById('chart-empty').style.display='flex';
      document.getElementById('chart-content').style.display='none';
    } else {
      renderChart(chartActivePyeong);
    }
  }
  saveApts();renderGrid();
}

function openDetail(aptId){
  const apt=apartments.find(a=>a.id===aptId);if(!apt)return;
  detailAptId=aptId;
  if((newCounts[aptId]||0)>0){
    newCounts[aptId]=0;
    const allTxs=Object.values(transactions[aptId]||{}).flat();
    lastSeen[aptId]=new Set(allTxs.map(t=>t.id));saveSeen();renderGrid();
  }
  document.getElementById('sheet-title').textContent=apt.aptName;
  document.getElementById('sheet-sub').textContent=`${apt.regionName} · 최근 ${currentPeriod>=12?(currentPeriod/12)+'년':currentPeriod+'개월'} 실거래`;
  document.getElementById('detail-tabs').innerHTML=apt.pyeongs.map(p=>
    `<button class="detail-tab${p===apt.pyeongs[0]?' active':''}" onclick="switchDetailTab('${p}',this)">${PYEONG_DEFS[p].label}</button>`
  ).join('');
  detailActivePyeong=apt.pyeongs[0];
  renderDetailBody(aptId,detailActivePyeong);
  openModal('detail-sheet');
}
function switchDetailTab(p,btn){
  document.querySelectorAll('.detail-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');detailActivePyeong=p;renderDetailBody(detailAptId,p);
}
function renderDetailBody(aptId,p){
  const txs=(transactions[aptId]||{})[p]||[];
  const body=document.getElementById('sheet-body');
  if(!txs.length){body.innerHTML='<div class="tx-no">조회된 거래 내역이 없습니다</div>';return;}
  body.innerHTML=txs.map((tx,i)=>{
    const prev=txs[i+1];const diff=prev?tx.price-prev.price:null;
    const dh=diff!==null?`<div class="tx-diff ${diff>0?'down-color':diff<0?'up-color':'neu-color'}">${diff>0?'▲':diff<0?'▼':'─'} ${formatPrice(Math.abs(diff))}</div>`:'';
    return `<div class="tx-row"><div><div class="tx-date">${tx.year}.${tx.month}.${tx.day} · ${tx.floor}층</div><div class="tx-detail">${pyeongStr(tx.area)} (${tx.area}㎡)</div></div><div><div class="tx-price">${formatPrice(tx.price)}</div>${dh}</div></div>`;
  }).join('');
}

function openModal(id){const el=document.getElementById(id);el.style.display='flex';requestAnimationFrame(()=>el.classList.add('show'));}
function closeModal(id){const el=document.getElementById(id);el.classList.remove('show');setTimeout(()=>{el.style.display='none';},220);}
function backdropClose(e,id){if(e.target===e.currentTarget)closeModal(id);}

(function init(){
  loadStorage();
  const sel=document.getElementById('region-select');
  sel.innerHTML=REGIONS.map(r=>`<option value="${r.code}">${r.name}</option>`).join('');
  sel.onchange=()=>{
    acCache={};
    const inp=document.getElementById('apt-name-input');
    inp.value='';
    inp.disabled=false;
    inp.style.opacity='1';
    inp.style.cursor='text';
    inp.placeholder='예: 헬리오시티, 래미안';
    inp.focus();
    document.getElementById('autocomplete-list').style.display='none';
    document.getElementById('apt-name-hint').textContent='이름을 입력하면 자동검색됩니다';
    document.getElementById('apt-name-hint').style.color='var(--muted)';
    acResults=[];
  };
  document.getElementById('add-modal').style.display='none';
  document.getElementById('select-modal').style.display='none';
  document.getElementById('detail-sheet').style.display='none';
  renderGrid();
  if(apartments.length>0) refreshAll();
})();
</script>
